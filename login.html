<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=800">
    <title>تسجيل الدخول - Spedia</title>
    <link rel="stylesheet" href="style.css?v=5">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: #fff;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            position: relative;
        }

        .form-group label {
            text-align: right;
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: 'Tajawal', sans-serif;
        }
    </style>
</head>

<body class="login-page">

    <div class="login-wrapper animate-on-scroll">
        <div class="login-container">
            <div class="login-header">
                <a href="index.html" class="login-logo text-center"
                    style="text-decoration:none; display:flex; flex-direction:column; align-items:center; gap:10px;">
                    <img src="img_logo.jpg" alt="Logo"
                        style="width:100px; height:100px; border-radius:50%; box-shadow:0 10px 20px rgba(0,0,0,0.1);">
                    <div class="logo-text">
                        <span class="ar"
                            style="font-size:32px; font-weight:900; color:var(--primary-color);">منصة محمد حسني التعلمية</span>
                        <span class="en" style="color:var(--text-dark);">Mohamed Hosny</span>
                    </div>
                </a>
                <h2 style="margin-top:15px;">أهلاً بك في منصتنا!</h2>
                <p>سجل دخولك باستخدام كود الاشتراك</p>
            </div>

            <form class="login-form" onsubmit="handleLogin(event)">
                <div class="form-group" style="text-align:right">
                    <label style="text-align:right; display:block;">كود الاشتراك</label>
                    <div class="input-icon">
                        <i class="fas fa-key"></i>
                        <input type="text" id="code-input" placeholder="أدخل الكود الخاص بك (مثال SPD-...)" required
                            autocomplete="off">
                    </div>
                </div>

                <button type="submit" class="btn-primary w-100 mt-20" style="font-size:18px;">تسجيل الدخول</button>
            </form>

            <div class="login-footer">
                <p>ليس لديك كود اشتراك؟</p>
                <button type="button" class="btn-primary w-100"
                    style="background:#25D366; border:none; margin-top:10px;" onclick="requestCode()">
                    <i class="fab fa-whatsapp"></i> طلب كود جديد
                </button>
            </div>
        </div>
    </div>

    <!-- Register Modal -->
    <div id="register-modal" class="modal">
        <div class="modal-content">
            <h3 style="text-align:center; color:var(--primary-color); margin-bottom:20px;">استكمال البيانات</h3>
            <p style="text-align:center; margin-bottom:15px; font-size:14px; color:#555;">أهلاً بك! يرجى استكمال بياناتك
                لفتح الحساب.</p>
            <form onsubmit="window.finishRegister(event)">
                <div class="form-group">
                    <label>الاسم الرباعي</label>
                    <input type="text" id="reg-name" required placeholder="أدخل اسمك الكامل">
                </div>
                <div class="form-group">
                    <label>رقم الهاتف</label>
                    <input type="tel" id="reg-phone" required placeholder="مثال: 01012345678">
                </div>
                
                <div class="form-group">
                    <label>المرحلة / السنة الدراسية</label>
                    <select id="reg-stage" required
                        onchange="if(window.updateGrades) window.updateGrades('reg-country', 'reg-stage', 'reg-grade')">
                        <option value="">اختر الدولة أولاً</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>الصف الدراسي</label>
                    <select id="reg-grade" required>
                        <option value="">اختر المرحلة أولاً</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary w-100 mt-10">حفظ وبدء التعلم</button>
                <button type="button" class="btn-icon"
                    style="position:absolute; top:10px; left:10px; border:none; background:transparent;"
                    onclick="closeRegisterModal()"><i class="fas fa-times"
                        style="color:#d32f2f; font-size:20px;"></i></button>
            </form>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module" src="firebase-init.js"></script>
    <script type="module" src="firebase-data.js"></script>
    <script src="script.js"></script>
    <script>
        // Methods for fetching grades are loaded from script.js
    </script>
</body>

</html>
